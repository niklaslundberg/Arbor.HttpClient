name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Arbor.HttpClient.slnx

      - name: Build
        run: dotnet build Arbor.HttpClient.slnx --no-restore --configuration Release

  unit-tests:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # dorny/test-reporter uses this to publish check-run test summaries (primarily visible on PRs).
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Arbor.HttpClient.slnx

      - name: Run unit tests
        run: >
          dotnet test src/Arbor.HttpClient.Core.Tests/Arbor.HttpClient.Core.Tests.csproj
          --no-restore
          --configuration Release
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=unit-tests.trx"
          --results-directory TestResults/unit
          --collect:"XPlat Code Coverage"

      - name: Publish unit test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Tests
          path: TestResults/unit/*.trx
          reporter: dotnet-trx
          fail-on-error: true
          fail-on-empty: false

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage
          # Keep coverage optional so missing files do not hide unit test outcomes in CI.
          path: "**/coverage.cobertura.xml"
          if-no-files-found: ignore

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: TestResults/unit/*.trx
          if-no-files-found: error

  e2e-tests:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # dorny/test-reporter uses this to publish check-run test summaries (primarily visible on PRs).
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Arbor.HttpClient.slnx

      - name: Run E2E tests
        run: >
          dotnet test src/Arbor.HttpClient.Desktop.E2E.Tests/Arbor.HttpClient.Desktop.E2E.Tests.csproj
          --no-restore
          --configuration Release
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=e2e-tests.trx"
          --results-directory TestResults/e2e

      - name: Publish E2E test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: E2E Tests
          path: TestResults/e2e/*.trx
          reporter: dotnet-trx
          fail-on-error: true
          fail-on-empty: false

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: TestResults/e2e/*.trx
          if-no-files-found: error
