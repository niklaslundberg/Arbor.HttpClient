name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false

      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.24.3"
          # SHA-256 from https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_checksums.txt
          GITLEAKS_SHA256="9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c"
          curl -sSLo /tmp/gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum --check --
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Scan for secrets (gitleaks)
        id: gitleaks
        run: |
          set +e
          gitleaks detect --source . --redact --report-format sarif --report-path gitleaks.sarif
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload gitleaks report
        if: ${{ always() && hashFiles('gitleaks.sarif') != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: gitleaks-report
          path: gitleaks.sarif
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload SARIF to code scanning
        if: ${{ always() && hashFiles('gitleaks.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a
        with:
          sarif_file: gitleaks.sarif

      - name: Fail if secrets were detected
        if: ${{ steps.gitleaks.outputs.exit_code != '0' }}
        run: |
          echo "Gitleaks detected potential secrets. See uploaded SARIF results for details."
          exit 1

  agent-instructions-sync:
    name: Agent Instructions Sync Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false

      - name: Assert CLAUDE.md and AGENTS.md body is identical
        run: |
          # The first line (title heading) intentionally differs:
          #   CLAUDE.md: "# Claude Agent Instructions"
          #   AGENTS.md: "# Codex Agent Instructions"
          # All other content must be identical.
          if ! diff <(tail -n +2 CLAUDE.md) <(tail -n +2 AGENTS.md); then
            echo "::error::CLAUDE.md and AGENTS.md body has diverged. They must be kept identical (except the first-line title) — update both files when making changes."
            exit 1
          fi
          echo "CLAUDE.md and AGENTS.md body is identical ✓"

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Arbor.HttpClient.slnx --locked-mode

      - name: Audit NuGet dependencies for vulnerabilities
        run: dotnet list Arbor.HttpClient.slnx package --vulnerable --include-transitive

      - name: Build
        run: dotnet build Arbor.HttpClient.slnx --no-restore --configuration Release

  unit-tests:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # dotnet-trx uses this to post test result comments on pull requests.
      pull-requests: write
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Arbor.HttpClient.slnx --locked-mode

      - name: Install test reporting tools
        run: |
          dotnet tool install -g dotnet-trx --version 1.0.1
          dotnet tool install -g trxlog2html --version 1.0.4
          dotnet tool install -g dotnet-reportgenerator-globaltool --version 5.5.6

      - name: Run unit tests
        run: >
          dotnet test src/Arbor.HttpClient.Core.Tests/Arbor.HttpClient.Core.Tests.csproj
          --no-restore
          --configuration Release
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=unit-tests.trx"
          --results-directory TestResults/unit
          --collect:"XPlat Code Coverage"

      - name: Report unit test results
        if: always()
        run: trx --path TestResults/unit --verbosity normal

      - name: Generate code coverage report
        if: ${{ !cancelled() }}
        run: |
          reportgenerator \
            -reports:"TestResults/unit/*/coverage.cobertura.xml" \
            -targetdir:"TestResults/coverage-report" \
            -reporttypes:"MarkdownSummaryGithub;Cobertura"

      - name: Add coverage report to job summary
        if: ${{ !cancelled() && hashFiles('TestResults/coverage-report/SummaryGithub.md') != '' }}
        run: cat TestResults/coverage-report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage
        if: ${{ !cancelled() }}
        id: upload-unit-coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: unit-test-coverage
          # Keep coverage optional so missing files do not hide unit test outcomes in CI.
          path: |
            TestResults/unit/*/coverage.cobertura.xml
            TestResults/coverage-report/SummaryGithub.md
          retention-days: 14
          if-no-files-found: ignore

      - name: Generate unit test HTML report
        if: always()
        run: |
          mkdir -p TestResults/unit/html
          trxlog2html -i TestResults/unit/unit-tests.trx -o TestResults/unit/html/index.html

      - name: Upload unit test results
        if: always()
        id: upload-unit-trx
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: unit-test-results
          path: TestResults/unit/*.trx
          retention-days: 14
          if-no-files-found: error

      - name: Upload unit test HTML report
        if: always()
        id: upload-unit-html
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: unit-test-results-html
          path: TestResults/unit/html/*.html
          retention-days: 14
          if-no-files-found: error

      - name: Summarize unit test artifacts
        if: always()
        run: |
          {
            echo "## Unit Test Artifacts"
            echo "| Report | Download |"
            echo "| ------ | -------- |"
            echo "| TRX results | [${{ steps.upload-unit-trx.outputs.artifact-url }}](${{ steps.upload-unit-trx.outputs.artifact-url }}) |"
            echo "| HTML report | [${{ steps.upload-unit-html.outputs.artifact-url }}](${{ steps.upload-unit-html.outputs.artifact-url }}) |"
            if [ -n "${{ steps.upload-unit-coverage.outputs.artifact-url }}" ]; then
              echo "| Code coverage | [${{ steps.upload-unit-coverage.outputs.artifact-url }}](${{ steps.upload-unit-coverage.outputs.artifact-url }}) |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  release-verification:
    name: Release Build Verification
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: "10.0.x"

      - name: Set version
        id: version
        shell: pwsh
        run: |
          $ver = "1.0.${{ github.run_number }}.0"
          $tag = "v1.0.${{ github.run_number }}"
          "VERSION=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "TAG=$tag"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $ver  Tag: $tag"

      - name: Restore
        run: dotnet restore Arbor.HttpClient.slnx --locked-mode

      - name: Install SBOM tool
        run: dotnet tool install --global microsoft.sbom.dotnettool --version 4.1.5

      - name: Audit NuGet dependencies for vulnerabilities
        run: dotnet list Arbor.HttpClient.slnx package --vulnerable --include-transitive

      - name: Build
        run: dotnet build Arbor.HttpClient.slnx --no-restore --configuration Release

      - name: Run unit tests
        run: >
          dotnet test src/Arbor.HttpClient.Core.Tests/Arbor.HttpClient.Core.Tests.csproj
          --no-restore
          --configuration Release
          --logger "console;verbosity=normal"

      - name: Publish win-x64 self-contained
        run: >
          dotnet publish src/Arbor.HttpClient.Desktop/Arbor.HttpClient.Desktop.csproj
          --configuration Release
          -r win-x64
          --self-contained true
          -o publish/win-x64

      - name: Build release artifacts
        shell: pwsh
        run: scripts/Build-Release.ps1 -Version "${{ steps.version.outputs.VERSION }}"

      # Attest build provenance is skipped here — it requires id-token: write which is
      # not granted to CI jobs. Attestation runs only in the release workflow on main.

      # GitHub Release creation is intentionally omitted — this job verifies the packaging
      # pipeline only; the actual release is created by the release workflow on main.

  experimental-vm-probe:
    name: Experimental — Windows VM / Hyper-V Probe
    runs-on: windows-latest
    # This job is intentionally non-blocking. Any failure here is diagnostic only.
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write  # needed to post PR comment with probe results
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: "10.0.x"

      # -----------------------------------------------------------------------
      # Step 1: Probe the environment
      # -----------------------------------------------------------------------
      - name: Probe environment and virtualisation capabilities
        id: probe-env
        continue-on-error: true
        shell: pwsh
        run: |
          $report = [System.Collections.Generic.List[string]]::new()
          $report.Add("## Environment Probe")
          $report.Add("")

          # OS information
          $os = Get-WmiObject Win32_OperatingSystem
          $report.Add("**OS:** $($os.Caption) build $($os.BuildNumber)")

          # CPU virtualisation flags
          $cpu = Get-WmiObject Win32_Processor | Select-Object -First 1
          $vmxFlag = ($cpu.VirtualizationFirmwareEnabled -eq $true)
          $report.Add("**CPU:** $($cpu.Name)")
          $report.Add("**VirtualizationFirmwareEnabled:** $vmxFlag")

          # Check if we are ourselves running inside a VM
          $model = (Get-WmiObject Win32_ComputerSystem).Model
          $report.Add("**ComputerSystem.Model:** $model")
          $isVm = ($model -match 'Virtual|HyperV|VMware|Xen|KVM')
          $report.Add("**Running inside a VM:** $isVm")

          # Hyper-V Windows feature state
          $hyperVFeature = Get-WindowsOptionalFeature -Online -FeatureName Microsoft-Hyper-V-All -ErrorAction SilentlyContinue
          $hvState = if ($hyperVFeature) { $hyperVFeature.State } else { "NotAvailable" }
          $report.Add("**Hyper-V feature state:** $hvState")

          # Hyper-V PowerShell module availability
          $hvModule = Get-Module -ListAvailable -Name Hyper-V -ErrorAction SilentlyContinue
          $report.Add("**Hyper-V PS module available:** $($null -ne $hvModule)")

          # SLAT / Second Level Address Translation (required for Hyper-V)
          # Reported via systeminfo
          $sysinfo = systeminfo 2>&1
          $slatLine = $sysinfo | Where-Object { $_ -match 'SLAT|Hyper-V' }
          $report.Add("")
          $report.Add("**systeminfo Hyper-V / SLAT lines:**")
          $slatLine | ForEach-Object { $report.Add("``$_``") }

          $report | Out-File -FilePath probe-env.txt -Encoding UTF8
          Write-Host ($report -join "`n")

          # Expose for later steps
          "HV_STATE=$hvState"          | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "CPU_VIRT=$vmxFlag"          | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "HV_MODULE=$($null -ne $hvModule)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # -----------------------------------------------------------------------
      # Step 2: Try to enable Hyper-V (may require a reboot — expected to fail)
      # -----------------------------------------------------------------------
      - name: Try enabling Hyper-V Windows feature
        id: enable-hv
        continue-on-error: true
        shell: pwsh
        run: |
          try {
              $result = Enable-WindowsOptionalFeature -Online -FeatureName Microsoft-Hyper-V-All `
                  -All -NoRestart -ErrorAction Stop
              $state = if ($result) { "RestartNeeded=$($result.RestartNeeded)" } else { "Enabled" }
          }
          catch {
              # Common on Windows Server runners: feature name is different or nested virt
              # feature is already active via the hypervisor. This is expected.
              $state = "Unavailable: $($_.Exception.Message)"
          }
          Write-Host "Enable-WindowsOptionalFeature result: $state"
          "RESTART_NEEDED=$state" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # -----------------------------------------------------------------------
      # Step 3: Build and publish the desktop app
      # -----------------------------------------------------------------------
      - name: Restore NuGet packages
        id: restore
        continue-on-error: true
        run: dotnet restore Arbor.HttpClient.slnx --locked-mode

      - name: Publish win-x64 self-contained
        id: publish
        continue-on-error: true
        shell: pwsh
        run: |
          dotnet publish src/Arbor.HttpClient.Desktop/Arbor.HttpClient.Desktop.csproj `
              --configuration Release `
              -r win-x64 `
              --self-contained true `
              -o publish/win-x64 `
              -v quiet
          $exe = "publish/win-x64/Arbor.HttpClient.Desktop.exe"
          $ok  = Test-Path $exe
          Write-Host "Publish succeeded: $ok  (exe: $exe)"
          "PUBLISH_OK=$ok" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # -----------------------------------------------------------------------
      # Step 4: Try creating a minimal Hyper-V VM (no OS — proves the API)
      # -----------------------------------------------------------------------
      - name: Try creating a minimal Hyper-V VM
        id: vm-create
        continue-on-error: true
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest

          $vmName = "Arbor-CI-Probe"
          $vhdPath = Join-Path $env:TEMP "arbor-ci-probe.vhdx"

          try {
              Import-Module Hyper-V -ErrorAction Stop
              Write-Host "Hyper-V module imported OK"
          }
          catch {
              Write-Host "Cannot import Hyper-V module: $_"
              "VM_RESULT=HyperV-module-unavailable" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              exit 0
          }

          # Remove any leftover from a previous run
          Remove-VM -Name $vmName -Force -ErrorAction SilentlyContinue
          Remove-Item $vhdPath -Force -ErrorAction SilentlyContinue

          # Create a tiny (1 GB) blank VHDX — no OS installed, just tests the storage API
          try {
              New-VHD -Path $vhdPath -SizeBytes 1GB -Dynamic | Out-Null
              Write-Host "New-VHD succeeded: $vhdPath"
          }
          catch {
              Write-Host "New-VHD failed: $_"
              "VM_RESULT=New-VHD-failed: $_" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              exit 0
          }

          # Create a Generation-2 VM (no switch — isolated, no network needed for probe)
          try {
              $vm = New-VM -Name $vmName -Generation 2 -MemoryStartupBytes 512MB `
                           -VHDPath $vhdPath -ErrorAction Stop
              Write-Host "New-VM succeeded: $($vm.Name)  State=$($vm.State)"
              "VM_RESULT=VM-created-OK" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }
          catch {
              Write-Host "New-VM failed: $_"
              "VM_RESULT=New-VM-failed: $_" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              exit 0
          }

          # Try starting it (expected to fail — no bootable OS — but proves scheduling works)
          try {
              Start-VM -Name $vmName -ErrorAction Stop
              Start-Sleep -Seconds 3
              $state = (Get-VM -Name $vmName).State
              Write-Host "Start-VM succeeded, state: $state"
              "VM_START=started-state-$state" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }
          catch {
              Write-Host "Start-VM failed (expected without an OS): $_"
              "VM_START=failed-expected: $_" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }
          finally {
              # Clean up regardless
              Stop-VM  -Name $vmName -TurnOff -Force -ErrorAction SilentlyContinue
              Remove-VM -Name $vmName -Force -ErrorAction SilentlyContinue
              Remove-Item $vhdPath -Force -ErrorAction SilentlyContinue
              Write-Host "Cleanup complete."
          }

      # -----------------------------------------------------------------------
      # Step 5: Launch the app directly on the Windows runner, drive it with
      # Win32 UI automation, and capture before/after screenshots.
      # -----------------------------------------------------------------------
      - name: Launch app, interact via Win32, and capture screenshots
        id: launch-app
        continue-on-error: true
        shell: pwsh
        run: |
          $exe = "publish/win-x64/Arbor.HttpClient.Desktop.exe"
          if (-not (Test-Path $exe)) {
              Write-Host "Exe not found at $exe — skipping launch."
              "APP_RUNNING=False" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              exit 0
          }

          # Add Win32 types for UI automation (use array-join to avoid here-string/YAML indentation conflict)
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          $csharp = @(
              'using System;'
              'using System.Runtime.InteropServices;'
              'public class Win32Ui {'
              '    [DllImport("user32.dll")] public static extern bool SetForegroundWindow(IntPtr hWnd);'
              '    [DllImport("user32.dll")] public static extern bool ShowWindow(IntPtr hWnd, int nCmdShow);'
              '}'
          ) -join "`n"
          Add-Type -TypeDefinition $csharp -ErrorAction SilentlyContinue

          function Take-Screenshot([string]$path) {
              try {
                  $bounds = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
                  $bmp = [System.Drawing.Bitmap]::new($bounds.Width, $bounds.Height)
                  $g   = [System.Drawing.Graphics]::FromImage($bmp)
                  $g.CopyFromScreen($bounds.Location, [System.Drawing.Point]::Empty, $bounds.Size)
                  $bmp.Save($path)
                  $g.Dispose(); $bmp.Dispose()
                  Write-Host "Screenshot saved: $path ($($bounds.Width)x$($bounds.Height))"
                  return $true
              }
              catch { Write-Host "Screenshot failed: $_"; return $false }
          }

          Write-Host "Launching: $exe"
          $proc = Start-Process -FilePath $exe -PassThru -WindowStyle Normal
          if (-not $proc) {
              Write-Host "Start-Process returned null."
              "APP_RUNNING=False" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              exit 0
          }
          Write-Host "Started PID: $($proc.Id)"

          # Wait for the UI to initialise and become ready for input
          $proc.WaitForInputIdle(10000) | Out-Null
          Start-Sleep -Seconds 3

          $running = -not $proc.HasExited
          Write-Host "Running after init: $running  ExitCode: $($proc.ExitCode)"
          "APP_RUNNING=$running" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

          if ($running) {
              $proc.Refresh()   # refresh cached properties like MainWindowHandle
              $hwnd = $proc.MainWindowHandle
              $title = $proc.MainWindowTitle
              Write-Host "Main window handle: $hwnd  Title: '$title'"
              "WINDOW_FOUND=$($hwnd -ne [IntPtr]::Zero)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

              if ($hwnd -ne [IntPtr]::Zero) {
                  [Win32Ui]::ShowWindow($hwnd, 9)        # SW_RESTORE
                  [Win32Ui]::SetForegroundWindow($hwnd)
                  Start-Sleep -Milliseconds 500
              }

              # Before-interaction screenshot
              $s1 = Take-Screenshot 'desktop-before.png'
              "SCREENSHOT_BEFORE=$s1" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

              # Drive the app with keyboard
              if ($hwnd -ne [IntPtr]::Zero) {
                  [System.Windows.Forms.SendKeys]::SendWait("{TAB}")
                  Start-Sleep -Milliseconds 300
                  [System.Windows.Forms.SendKeys]::SendWait("{TAB}")
                  Start-Sleep -Milliseconds 300
                  # Type something in the URL bar (likely focused after TABs)
                  [System.Windows.Forms.SendKeys]::SendWait("https://example.com")
                  Start-Sleep -Milliseconds 500
                  Write-Host "Sent keyboard input OK"
                  "UI_INTERACTION=ok" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              } else {
                  Write-Host "No window handle — skipping keyboard input"
                  "UI_INTERACTION=no-window" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              }

              # After-interaction screenshot
              $s2 = Take-Screenshot 'desktop-after.png'
              "SCREENSHOT_AFTER=$s2" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

              # Graceful shutdown
              $proc | Stop-Process -Force -ErrorAction SilentlyContinue
              Write-Host "App stopped."
          }

      - name: Upload desktop screenshots
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: desktop-screenshots
          path: |
            desktop-before.png
            desktop-after.png
          retention-days: 14
          if-no-files-found: ignore

      # -----------------------------------------------------------------------
      # Step 6: Summarise all findings
      # -----------------------------------------------------------------------
      - name: Write probe summary
        if: always()
        continue-on-error: true
        shell: pwsh
        run: |
          $lines = @(
            "## Experimental VM / Hyper-V Probe Results"
            ""
            "This job is non-blocking (continue-on-error: true). Results are for diagnostic"
            "purposes only and do not affect the CI outcome."
            ""
            "### Environment"
            "| Check | Result |"
            "|---|---|"
            "| CPU virtualisation firmware enabled | ${{ steps.probe-env.outputs.CPU_VIRT }} |"
            "| Hyper-V Windows feature state | ${{ steps.probe-env.outputs.HV_STATE }} |"
            "| Hyper-V PS module available | ${{ steps.probe-env.outputs.HV_MODULE }} |"
            "| Enable-WindowsOptionalFeature | ${{ steps.enable-hv.outputs.RESTART_NEEDED }} |"
            ""
            "### App Build"
            "| Step | Outcome |"
            "|---|---|"
            "| dotnet restore | ${{ steps.restore.outcome }} |"
            "| dotnet publish (win-x64 self-contained) | ${{ steps.publish.outcome }} (${{ steps.publish.outputs.PUBLISH_OK }}) |"
            ""
            "### VM Creation (Hyper-V nested virtualisation)"
            "| Step | Outcome |"
            "|---|---|"
            "| New-VHD + New-VM (no OS) | ${{ steps.vm-create.outputs.VM_RESULT }} |"
            "| Start-VM | ${{ steps.vm-create.outputs.VM_START }} |"
            ""
            "### App launch and UI automation (direct on runner)"
            "| Step | Outcome |"
            "|---|---|"
            "| App running after init | ${{ steps.launch-app.outputs.APP_RUNNING }} |"
            "| Window handle found | ${{ steps.launch-app.outputs.WINDOW_FOUND }} |"
            "| UI keyboard interaction | ${{ steps.launch-app.outputs.UI_INTERACTION }} |"
            "| Before-interaction screenshot | ${{ steps.launch-app.outputs.SCREENSHOT_BEFORE }} |"
            "| After-interaction screenshot | ${{ steps.launch-app.outputs.SCREENSHOT_AFTER }} |"
            ""
            "### Next steps"
            '- VM creation confirmed working. Next: provide a sysprepped Windows VHDX base'
            '  and run Start-UIAutomation.ps1 end-to-end (see docs/vm-ui-automation.md sub-task 7).'
            '- UI interaction via SendKeys is working directly on the runner.'
            '  Next: verify the after-interaction screenshot shows the typed URL in the URL bar.'
          )
          $md = $lines -join "`n"
          $md | Out-File -FilePath probe-summary.md -Encoding UTF8
          $md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding UTF8 -Append

      - name: Upload probe report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: vm-probe-report
          path: |
            probe-env.txt
            probe-summary.md
          retention-days: 14
          if-no-files-found: ignore

      # -----------------------------------------------------------------------
      # Step 8: Post a PR comment summarising the probe results
      # -----------------------------------------------------------------------
      - name: Post probe results as PR comment
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          $artifactNote = "Screenshots uploaded as the **desktop-screenshots** artifact in the [run]($runUrl)."

          $body = @"
          ## Experimental VM / Hyper-V Probe - Run ${{ github.run_number }}

          > **This job is non-blocking** (continue-on-error: true). Results below are for
          > iterative development of the VM-based UI automation pipeline.

          ### Environment
          | Check | Result |
          |---|---|
          | CPU virtualisation firmware enabled | ${{ steps.probe-env.outputs.CPU_VIRT }} |
          | Hyper-V PS module available | ${{ steps.probe-env.outputs.HV_MODULE }} |
          | Enable-WindowsOptionalFeature | ${{ steps.enable-hv.outputs.RESTART_NEEDED }} |

          ### App Build
          | Step | Outcome |
          |---|---|
          | dotnet restore | ${{ steps.restore.outcome }} |
          | dotnet publish win-x64 self-contained | ${{ steps.publish.outcome }} (exe found: ${{ steps.publish.outputs.PUBLISH_OK }}) |

          ### Hyper-V Nested VM
          | Step | Outcome |
          |---|---|
          | New-VHD + New-VM (no OS) | ${{ steps.vm-create.outputs.VM_RESULT }} |
          | Start-VM | ${{ steps.vm-create.outputs.VM_START }} |

          ### App Launch and UI Automation (direct on runner)
          | Check | Result |
          |---|---|
          | App running after init | ${{ steps.launch-app.outputs.APP_RUNNING }} |
          | Window handle found | ${{ steps.launch-app.outputs.WINDOW_FOUND }} |
          | UI keyboard interaction | ${{ steps.launch-app.outputs.UI_INTERACTION }} |
          | Before-interaction screenshot | ${{ steps.launch-app.outputs.SCREENSHOT_BEFORE }} |
          | After-interaction screenshot | ${{ steps.launch-app.outputs.SCREENSHOT_AFTER }} |

          $artifactNote

          ---
          [Full run logs]($runUrl)
          "@

          gh pr comment "${{ github.event.pull_request.number }}" `
            --body $body `
            --repo "${{ github.repository }}"

  e2e-tests:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # dotnet-trx uses this to post test result comments on pull requests.
      pull-requests: write
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Arbor.HttpClient.slnx --locked-mode

      - name: Install test reporting tools
        run: |
          dotnet tool install -g dotnet-trx --version 1.0.1
          dotnet tool install -g trxlog2html --version 1.0.4

      - name: Run E2E tests
        env:
          SCREENSHOT_OUTPUT_DIR: TestResults/screenshots
        run: >
          dotnet test src/Arbor.HttpClient.Desktop.E2E.Tests/Arbor.HttpClient.Desktop.E2E.Tests.csproj
          --no-restore
          --configuration Release
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=e2e-tests.trx"
          --results-directory TestResults/e2e

      - name: Report E2E test results
        if: always()
        run: trx --path TestResults/e2e --verbosity normal

      - name: Generate E2E test HTML report
        if: always()
        run: |
          mkdir -p TestResults/e2e/html
          trxlog2html -i TestResults/e2e/e2e-tests.trx -o TestResults/e2e/html/index.html

      - name: Upload E2E test results
        if: always()
        id: upload-e2e-trx
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: e2e-test-results
          path: TestResults/e2e/*.trx
          retention-days: 14
          if-no-files-found: error

      - name: Upload E2E test HTML report
        if: always()
        id: upload-e2e-html
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: e2e-test-results-html
          path: TestResults/e2e/html/*.html
          retention-days: 14
          if-no-files-found: error

      - name: Upload E2E screenshots
        if: always()
        id: upload-e2e-screenshots
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: e2e-screenshots
          path: TestResults/screenshots/*.png
          retention-days: 14
          if-no-files-found: ignore

      - name: Summarize E2E test artifacts
        if: always()
        run: |
          {
            echo "## E2E Test Artifacts"
            echo "| Report | Download |"
            echo "| ------ | -------- |"
            echo "| TRX results | [${{ steps.upload-e2e-trx.outputs.artifact-url }}](${{ steps.upload-e2e-trx.outputs.artifact-url }}) |"
            echo "| HTML report | [${{ steps.upload-e2e-html.outputs.artifact-url }}](${{ steps.upload-e2e-html.outputs.artifact-url }}) |"
            if [ -n "${{ steps.upload-e2e-screenshots.outputs.artifact-url }}" ]; then
              echo "| Screenshots | [${{ steps.upload-e2e-screenshots.outputs.artifact-url }}](${{ steps.upload-e2e-screenshots.outputs.artifact-url }}) |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
