name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build and Release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: "10.0.x"

      - name: Set version
        id: version
        shell: pwsh
        run: |
          $ver = "1.0.${{ github.run_number }}.0"
          $tag = "v1.0.${{ github.run_number }}"
          "VERSION=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "TAG=$tag"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $ver  Tag: $tag"

      - name: Restore
        run: dotnet restore Arbor.HttpClient.slnx --locked-mode

      - name: Install SBOM tool
        run: dotnet tool install --global microsoft.sbom.dotnettool --version 4.1.5

      - name: Audit NuGet dependencies for vulnerabilities
        run: dotnet list Arbor.HttpClient.slnx package --vulnerable --include-transitive

      - name: Build
        run: dotnet build Arbor.HttpClient.slnx --no-restore --configuration Release

      - name: Run unit tests
        run: >
          dotnet test src/Arbor.HttpClient.Core.Tests/Arbor.HttpClient.Core.Tests.csproj
          --no-restore
          --configuration Release
          --logger "console;verbosity=normal"

      - name: Publish win-x64 self-contained
        run: >
          dotnet publish src/Arbor.HttpClient.Desktop/Arbor.HttpClient.Desktop.csproj
          --configuration Release
          -r win-x64
          --self-contained true
          -o publish/win-x64

      - name: Build release artifacts
        shell: pwsh
        run: scripts/Build-Release.ps1 -Version "${{ steps.version.outputs.VERSION }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018
        with:
          subject-path: Arbor.HttpClient.Desktop.msix

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.TAG }}"
          # Delete existing release and tag if present so re-runs are idempotent
          gh release delete $tag --yes --cleanup-tag 2>$null || $true
          gh release create $tag `
            --generate-notes `
            --title "Release $tag" `
            Arbor.HttpClient.Desktop.msix `
            Arbor.HttpClient.Desktop.cer `
            Arbor.HttpClient.Desktop.msix.sha256 `
            Arbor.HttpClient.Desktop.cer.sha256 `
            publish/win-x64/_manifest/spdx_2.2/manifest.spdx.json
