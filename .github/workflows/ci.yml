name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false

      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.24.3"
          # SHA-256 from https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_checksums.txt
          GITLEAKS_SHA256="9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c"
          curl -sSLo /tmp/gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum --check --
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Scan for secrets (gitleaks)
        id: gitleaks
        run: |
          set +e
          gitleaks detect --source . --redact --report-format sarif --report-path gitleaks.sarif
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload gitleaks report
        if: ${{ always() && hashFiles('gitleaks.sarif') != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: gitleaks-report
          path: gitleaks.sarif
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload SARIF to code scanning
        if: ${{ always() && hashFiles('gitleaks.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a
        with:
          sarif_file: gitleaks.sarif

      - name: Fail if secrets were detected
        if: ${{ steps.gitleaks.outputs.exit_code != '0' }}
        run: |
          echo "Gitleaks detected potential secrets. See uploaded SARIF results for details."
          exit 1

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Arbor.HttpClient.slnx --locked-mode

      - name: Audit NuGet dependencies for vulnerabilities
        run: dotnet list Arbor.HttpClient.slnx package --vulnerable --include-transitive

      - name: Build
        run: dotnet build Arbor.HttpClient.slnx --no-restore --configuration Release

  unit-tests:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # dotnet-trx uses this to post test result comments on pull requests.
      pull-requests: write
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Arbor.HttpClient.slnx --locked-mode

      - name: Install test reporting tools
        run: |
          dotnet tool install -g dotnet-trx --version 1.0.1
          dotnet tool install -g trxlog2html --version 1.0.4
          dotnet tool install -g dotnet-reportgenerator-globaltool --version 5.5.6

      - name: Run unit tests
        run: >
          dotnet test src/Arbor.HttpClient.Core.Tests/Arbor.HttpClient.Core.Tests.csproj
          --no-restore
          --configuration Release
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=unit-tests.trx"
          --results-directory TestResults/unit
          --collect:"XPlat Code Coverage"

      - name: Report unit test results
        if: always()
        run: trx --path TestResults/unit --verbosity normal

      - name: Generate code coverage report
        if: ${{ !cancelled() }}
        run: |
          reportgenerator \
            -reports:"TestResults/unit/*/coverage.cobertura.xml" \
            -targetdir:"TestResults/coverage-report" \
            -reporttypes:"MarkdownSummaryGithub;Cobertura"

      - name: Add coverage report to job summary
        if: ${{ !cancelled() && hashFiles('TestResults/coverage-report/SummaryGithub.md') != '' }}
        run: cat TestResults/coverage-report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage
        if: ${{ !cancelled() }}
        id: upload-unit-coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: unit-test-coverage
          # Keep coverage optional so missing files do not hide unit test outcomes in CI.
          path: |
            TestResults/unit/*/coverage.cobertura.xml
            TestResults/coverage-report/SummaryGithub.md
          retention-days: 14
          if-no-files-found: ignore

      - name: Generate unit test HTML report
        if: always()
        run: |
          mkdir -p TestResults/unit/html
          trxlog2html -i TestResults/unit/unit-tests.trx -o TestResults/unit/html/index.html

      - name: Upload unit test results
        if: always()
        id: upload-unit-trx
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: unit-test-results
          path: TestResults/unit/*.trx
          retention-days: 14
          if-no-files-found: error

      - name: Upload unit test HTML report
        if: always()
        id: upload-unit-html
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: unit-test-results-html
          path: TestResults/unit/html/*.html
          retention-days: 14
          if-no-files-found: error

      - name: Summarize unit test artifacts
        if: always()
        run: |
          {
            echo "## Unit Test Artifacts"
            echo "| Report | Download |"
            echo "| ------ | -------- |"
            echo "| TRX results | [${{ steps.upload-unit-trx.outputs.artifact-url }}](${{ steps.upload-unit-trx.outputs.artifact-url }}) |"
            echo "| HTML report | [${{ steps.upload-unit-html.outputs.artifact-url }}](${{ steps.upload-unit-html.outputs.artifact-url }}) |"
            if [ -n "${{ steps.upload-unit-coverage.outputs.artifact-url }}" ]; then
              echo "| Code coverage | [${{ steps.upload-unit-coverage.outputs.artifact-url }}](${{ steps.upload-unit-coverage.outputs.artifact-url }}) |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  release-verification:
    name: Release Build Verification
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: "10.0.x"

      - name: Set version
        id: version
        shell: pwsh
        run: |
          $ver = "1.0.${{ github.run_number }}.0"
          $tag = "v1.0.${{ github.run_number }}"
          "VERSION=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "TAG=$tag"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $ver  Tag: $tag"

      - name: Restore
        run: dotnet restore Arbor.HttpClient.slnx --locked-mode

      - name: Install SBOM tool
        run: dotnet tool install --global microsoft.sbom.dotnettool --version 4.1.5

      - name: Audit NuGet dependencies for vulnerabilities
        run: dotnet list Arbor.HttpClient.slnx package --vulnerable --include-transitive

      - name: Build
        run: dotnet build Arbor.HttpClient.slnx --no-restore --configuration Release

      - name: Run unit tests
        run: >
          dotnet test src/Arbor.HttpClient.Core.Tests/Arbor.HttpClient.Core.Tests.csproj
          --no-restore
          --configuration Release
          --logger "console;verbosity=normal"

      - name: Publish win-x64 self-contained
        run: >
          dotnet publish src/Arbor.HttpClient.Desktop/Arbor.HttpClient.Desktop.csproj
          --configuration Release
          -r win-x64
          --self-contained true
          -o publish/win-x64

      - name: Create MSIX package layout
        shell: pwsh
        run: |
          $publishDir = "publish/win-x64"
          $assetsDir  = "$publishDir/Assets"
          New-Item -ItemType Directory -Force -Path $assetsDir | Out-Null

          # Inject version into AppxManifest and write it to the publish directory
          $manifest = Get-Content "src/Arbor.HttpClient.Desktop/packaging/AppxManifest.xml" -Raw
          $manifest  = $manifest -replace 'VERSION_PLACEHOLDER', '${{ steps.version.outputs.VERSION }}'
          $manifest | Set-Content "$publishDir/AppxManifest.xml" -Encoding UTF8

          # Generate the required MSIX logo images using ImageMagick (pre-installed on windows-latest)
          $color = "#0078D4"
          magick -size  44x44  xc:"$color" "$assetsDir/Square44x44Logo.png"
          magick -size 150x150 xc:"$color" "$assetsDir/Square150x150Logo.png"
          magick -size 310x150 xc:"$color" "$assetsDir/Wide310x150Logo.png"
          magick -size  50x50  xc:"$color" "$assetsDir/StoreLogo.png"
          magick -size 620x300 xc:"$color" "$assetsDir/SplashScreen.png"

      - name: Create MSIX package
        shell: pwsh
        run: |
          $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "makeappx.exe" |
            Where-Object { $_.FullName -like "*x64*" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          Write-Host "makeappx: $makeappx"
          & $makeappx pack /d publish/win-x64 /p Arbor.HttpClient.Desktop.msix

      - name: Generate SBOM (build artifacts)
        shell: pwsh
        run: |
          sbom-tool Generate `
            -b publish/win-x64 `
            -bc . `
            -pn "Arbor.HttpClient.Desktop" `
            -pv "${{ steps.version.outputs.VERSION }}" `
            -ps "Niklas Lundberg" `
            -m publish/win-x64 `
            -V Information

      - name: Verify SBOM manifest exists
        shell: pwsh
        run: |
          $sbomPath = "publish/win-x64/_manifest/spdx_2.2/manifest.spdx.json"
          if (-not (Test-Path $sbomPath)) {
            Write-Error "SBOM manifest not found at expected path: $sbomPath"
            exit 1
          }
          Write-Host "SBOM manifest verified at: $sbomPath"

      # Attest build provenance is skipped here — it requires id-token: write which is
      # not granted to CI jobs. Attestation runs only in the release workflow on main.

      - name: Create self-signed signing certificate
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject "CN=Arbor.HttpClient" `
            -KeyUsage DigitalSignature `
            -FriendlyName "Arbor.HttpClient" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")

          $pwd = ConvertTo-SecureString -String "CI_SIGN_CERT" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath packaging.pfx -Password $pwd | Out-Null
          Export-Certificate    -Cert $cert -FilePath Arbor.HttpClient.Desktop.cer  | Out-Null
          Write-Host "Certificate thumbprint: $($cert.Thumbprint)"

      - name: Sign MSIX
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -like "*x64*" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          Write-Host "signtool: $signtool"
          & $signtool sign /fd SHA256 /a /f packaging.pfx /p "CI_SIGN_CERT" Arbor.HttpClient.Desktop.msix

      - name: Generate artifact checksums
        shell: pwsh
        run: |
          Get-FileHash Arbor.HttpClient.Desktop.msix -Algorithm SHA256 | ForEach-Object {
            "$($_.Hash.ToLowerInvariant()) *Arbor.HttpClient.Desktop.msix"
          } | Set-Content Arbor.HttpClient.Desktop.msix.sha256 -Encoding UTF8

          Get-FileHash Arbor.HttpClient.Desktop.cer -Algorithm SHA256 | ForEach-Object {
            "$($_.Hash.ToLowerInvariant()) *Arbor.HttpClient.Desktop.cer"
          } | Set-Content Arbor.HttpClient.Desktop.cer.sha256 -Encoding UTF8

      # GitHub Release creation is intentionally omitted — this job verifies the packaging
      # pipeline only; the actual release is created by the release workflow on main.

  e2e-tests:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # dotnet-trx uses this to post test result comments on pull requests.
      pull-requests: write
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Arbor.HttpClient.slnx --locked-mode

      - name: Install test reporting tools
        run: |
          dotnet tool install -g dotnet-trx --version 1.0.1
          dotnet tool install -g trxlog2html --version 1.0.4

      - name: Run E2E tests
        env:
          SCREENSHOT_OUTPUT_DIR: TestResults/screenshots
        run: >
          dotnet test src/Arbor.HttpClient.Desktop.E2E.Tests/Arbor.HttpClient.Desktop.E2E.Tests.csproj
          --no-restore
          --configuration Release
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=e2e-tests.trx"
          --results-directory TestResults/e2e

      - name: Report E2E test results
        if: always()
        run: trx --path TestResults/e2e --verbosity normal

      - name: Generate E2E test HTML report
        if: always()
        run: |
          mkdir -p TestResults/e2e/html
          trxlog2html -i TestResults/e2e/e2e-tests.trx -o TestResults/e2e/html/index.html

      - name: Upload E2E test results
        if: always()
        id: upload-e2e-trx
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: e2e-test-results
          path: TestResults/e2e/*.trx
          retention-days: 14
          if-no-files-found: error

      - name: Upload E2E test HTML report
        if: always()
        id: upload-e2e-html
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: e2e-test-results-html
          path: TestResults/e2e/html/*.html
          retention-days: 14
          if-no-files-found: error

      - name: Upload E2E screenshots
        if: always()
        id: upload-e2e-screenshots
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: e2e-screenshots
          path: TestResults/screenshots/*.png
          retention-days: 14
          if-no-files-found: ignore

      - name: Summarize E2E test artifacts
        if: always()
        run: |
          {
            echo "## E2E Test Artifacts"
            echo "| Report | Download |"
            echo "| ------ | -------- |"
            echo "| TRX results | [${{ steps.upload-e2e-trx.outputs.artifact-url }}](${{ steps.upload-e2e-trx.outputs.artifact-url }}) |"
            echo "| HTML report | [${{ steps.upload-e2e-html.outputs.artifact-url }}](${{ steps.upload-e2e-html.outputs.artifact-url }}) |"
            if [ -n "${{ steps.upload-e2e-screenshots.outputs.artifact-url }}" ]; then
              echo "| Screenshots | [${{ steps.upload-e2e-screenshots.outputs.artifact-url }}](${{ steps.upload-e2e-screenshots.outputs.artifact-url }}) |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
