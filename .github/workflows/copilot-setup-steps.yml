name: "Copilot Setup Steps"

# Run automatically when this file changes and allow manual verification.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or Copilot will not pick it up.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false

      # -----------------------------------------------------------------------
      # .NET SDK — install the version the project targets
      # -----------------------------------------------------------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: "10.0.x"

      # -----------------------------------------------------------------------
      # NuGet package restore — warm the global package cache so the agent
      # does not need to download packages on every task.
      # -----------------------------------------------------------------------
      - name: Restore NuGet packages
        run: dotnet restore Arbor.HttpClient.slnx --locked-mode

      # -----------------------------------------------------------------------
      # QEMU/KVM prerequisites for the KVM+Alpine system test flow.
      # /dev/kvm is available in the Copilot agent environment; the runner user
      # needs write permission which we grant via chmod.
      # -----------------------------------------------------------------------
      - name: Install QEMU and VM tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            qemu-kvm qemu-utils cloud-image-utils genisoimage \
            sshpass ffmpeg

      - name: Grant runner access to /dev/kvm
        run: |
          if [[ -e /dev/kvm ]]; then
            sudo chmod 666 /dev/kvm
            echo "KVM access granted."
          else
            echo "WARN: /dev/kvm not present — KVM acceleration unavailable." >&2
          fi

      # -----------------------------------------------------------------------
      # Cache the Alpine Linux QEMU cloud image so the agent can run the
      # KVM system test flow without a download step.
      # The cache key is pinned to the image version; bump the version here
      # when upgrading Alpine.
      # -----------------------------------------------------------------------
      - name: Restore Alpine image from cache
        id: cache-alpine
        uses: actions/cache@5a3ec84eff668e56bc51ca40d99671ee91efbd15
        with:
          path: /tmp/arbor-vms/nocloud_alpine-3.21.7-x86_64-bios-cloudinit-r0.qcow2
          key: alpine-qcow2-3.21.7

      - name: Download and verify Alpine 3.21.7 cloud image
        if: steps.cache-alpine.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p /tmp/arbor-vms

          VER="3.21.7"
          MAJOR_MINOR="3.21"
          IMAGE_FILE="nocloud_alpine-${VER}-x86_64-bios-cloudinit-r0.qcow2"
          IMAGE_URL="https://dl-cdn.alpinelinux.org/alpine/v${MAJOR_MINOR}/releases/cloud/${IMAGE_FILE}"
          SHA512_URL="${IMAGE_URL}.sha512"
          DEST="/tmp/arbor-vms/${IMAGE_FILE}"

          echo "Downloading Alpine ${VER} cloud image..."
          curl -fSL --progress-bar -o "${DEST}.tmp" "$IMAGE_URL"

          echo "Verifying SHA-512 checksum..."
          EXPECTED="$(curl -fsSL "$SHA512_URL" | awk '{print $1}')"
          if [[ ! "$EXPECTED" =~ ^[0-9a-f]{128}$ ]]; then
            echo "ERROR: Malformed SHA-512 from $SHA512_URL" >&2
            rm -f "${DEST}.tmp"
            exit 1
          fi

          ACTUAL="$(sha512sum "${DEST}.tmp" | awk '{print $1}')"
          if [[ "$EXPECTED" != "$ACTUAL" ]]; then
            echo "ERROR: SHA-512 mismatch" >&2
            echo "  Expected: $EXPECTED" >&2
            echo "  Actual  : $ACTUAL" >&2
            rm -f "${DEST}.tmp"
            exit 1
          fi

          mv "${DEST}.tmp" "$DEST"
          echo "Image saved: $DEST"

          # Resize to 4 GiB — needed for package installation + app deployment
          qemu-img resize "$DEST" 4G
          echo "Image resized to 4 GiB."
          qemu-img info "$DEST" | head -4
