name: "Copilot Setup Steps"

# Run automatically when this file changes and allow manual verification.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or Copilot will not pick it up.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false

      # -----------------------------------------------------------------------
      # .NET SDK
      # -----------------------------------------------------------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: "10.0.x"

      - name: Restore NuGet packages
        run: dotnet restore Arbor.HttpClient.slnx --locked-mode

      # -----------------------------------------------------------------------
      # QEMU/KVM tools + /dev/kvm access
      # -----------------------------------------------------------------------
      - name: Install QEMU and VM tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            qemu-kvm qemu-utils cloud-image-utils genisoimage \
            sshpass ffmpeg e2fsprogs python3

      - name: Grant runner access to /dev/kvm
        run: |
          if [[ -e /dev/kvm ]]; then
            sudo chmod 666 /dev/kvm
            echo "KVM access granted."
          else
            echo "WARN: /dev/kvm not present — KVM acceleration unavailable." >&2
          fi

      # -----------------------------------------------------------------------
      # Three-layer cache for the Alpine KVM flow.
      #
      # Layer 1: Raw Alpine cloud image (~165 MB).
      #   Cached separately so the prepared image rebuild can reuse it without
      #   a CDN download.
      #
      # Layer 2: Downloaded .apk package files (~145 MB).
      #   The caching proxy (scripts/apk-proxy.py) stores packages here.
      #   A cache hit means package installation in the prepare step requires
      #   no CDN traffic at all.
      #
      # Layer 3: Prepared image (~248 MB, includes pre-installed packages).
      #   This is what start-ui-automation-kvm-alpine.sh boots directly — the
      #   fastest path, skipping all package installation at test time.
      #
      # Cache invalidation:
      #   - Bump the patch version (3.21.7 → 3.21.x) to rebuild all three.
      #   - Change PACKAGES list in prepare-alpine-image.sh → bump v1 suffix.
      # -----------------------------------------------------------------------

      # Layer 1 — raw base image
      - name: Restore Alpine base image from cache
        id: cache-alpine-base
        uses: actions/cache@v4
        with:
          path: /tmp/arbor-vms/nocloud_alpine-3.21.7-x86_64-bios-cloudinit-r0.qcow2
          key: alpine-qcow2-3.21.7

      # Layer 2 — downloaded .apk packages
      - name: Restore APK package cache
        id: cache-apk-packages
        uses: actions/cache@v4
        with:
          path: /tmp/alpine-mirror
          key: alpine-apk-cache-3.21-v1

      # Layer 3 — prepared image (packages pre-installed)
      - name: Restore prepared Alpine image from cache
        id: cache-alpine-prepared
        uses: actions/cache@v4
        with:
          path: /tmp/arbor-vms/nocloud_alpine-3.21.7-prepared.qcow2
          key: alpine-prepared-3.21.7-v1

      # Build the prepared image only when none of the caches hit
      - name: Build prepared Alpine image
        if: steps.cache-alpine-prepared.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p /tmp/arbor-vms /tmp/alpine-mirror

          # Load the nbd kernel module needed by prepare-alpine-image.sh
          sudo modprobe nbd max_part=8 || true

          chmod +x scripts/prepare-alpine-image.sh
          sudo -E bash scripts/prepare-alpine-image.sh \
            --images-dir   /tmp/arbor-vms \
            --apk-cache-dir /tmp/alpine-mirror \
            --output-image  /tmp/arbor-vms/nocloud_alpine-3.21.7-prepared.qcow2

      - name: Verify prepared image
        run: |
          IMAGE=/tmp/arbor-vms/nocloud_alpine-3.21.7-prepared.qcow2
          if [[ -f "$IMAGE" ]]; then
            SIZE=$(du -sh "$IMAGE" | awk '{print $1}')
            echo "Prepared image ready: $IMAGE ($SIZE)"
            qemu-img info "$IMAGE" | head -4
          else
            echo "ERROR: Prepared image not found!" >&2
            exit 1
          fi

