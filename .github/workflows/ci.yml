name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Arbor.HttpClient.slnx

      - name: Build
        run: dotnet build Arbor.HttpClient.slnx --no-restore --configuration Release

  unit-tests:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # dorny/test-reporter uses this to publish check-run test summaries (primarily visible on PRs).
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Arbor.HttpClient.slnx

      - name: Run unit tests
        run: >
          dotnet test src/Arbor.HttpClient.Core.Tests/Arbor.HttpClient.Core.Tests.csproj
          --no-restore
          --configuration Release
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=unit-tests.trx"
          --results-directory TestResults/unit
          --collect:"XPlat Code Coverage"

      - name: Publish unit test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Tests
          path: TestResults/unit/*.trx
          reporter: dotnet-trx
          fail-on-error: true
          fail-on-empty: false

      - name: Upload coverage
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage
          # Keep coverage optional so missing files do not hide unit test outcomes in CI.
          path: "**/coverage.cobertura.xml"
          if-no-files-found: ignore

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: TestResults/unit/*.trx
          if-no-files-found: error

      - name: Generate unit test HTML report
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          import html
          import xml.etree.ElementTree as ET

          results_dir = Path("TestResults/unit")
          html_dir = results_dir / "html"
          html_dir.mkdir(parents=True, exist_ok=True)
          report_file = html_dir / "index.html"

          trx_files = sorted(results_dir.glob("*.trx"))
          rows = []

          if trx_files:
              ns = {"t": "http://microsoft.com/schemas/VisualStudio/TeamTest/2010"}
              for trx_file in trx_files:
                  root = ET.parse(trx_file).getroot()
                  for test in root.findall(".//t:UnitTestResult", ns):
                      name = test.attrib.get("testName", "Unknown")
                      outcome = test.attrib.get("outcome", "Unknown")
                      duration = test.attrib.get("duration", "")
                      rows.append(
                          f"<tr><td>{html.escape(name)}</td><td>{html.escape(outcome)}</td><td>{html.escape(duration)}</td></tr>"
                      )

          body = "".join(rows) if rows else "<tr><td colspan='3'>No test results were found.</td></tr>"
          report_file.write_text(
              "<!doctype html><html><head><meta charset='utf-8'><title>Unit Tests</title>"
              "<style>body{font-family:Arial,sans-serif;margin:20px;}table{border-collapse:collapse;width:100%;}"
              "th,td{border:1px solid #ddd;padding:8px;text-align:left;}th{background:#f3f3f3;}</style></head>"
              "<body><h1>Unit Test Results</h1><table><thead><tr><th>Test</th><th>Outcome</th><th>Duration</th></tr></thead>"
              f"<tbody>{body}</tbody></table></body></html>",
              encoding="utf-8"
          )
          PY

      - name: Upload unit test HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-html
          path: TestResults/unit/html/*.html
          if-no-files-found: error

  e2e-tests:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # dorny/test-reporter uses this to publish check-run test summaries (primarily visible on PRs).
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Arbor.HttpClient.slnx

      - name: Run E2E tests
        run: >
          dotnet test src/Arbor.HttpClient.Desktop.E2E.Tests/Arbor.HttpClient.Desktop.E2E.Tests.csproj
          --no-restore
          --configuration Release
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=e2e-tests.trx"
          --results-directory TestResults/e2e

      - name: Publish E2E test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: E2E Tests
          path: TestResults/e2e/*.trx
          reporter: dotnet-trx
          fail-on-error: true
          fail-on-empty: false

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: TestResults/e2e/*.trx
          if-no-files-found: error

      - name: Generate E2E test HTML report
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          import html
          import xml.etree.ElementTree as ET

          results_dir = Path("TestResults/e2e")
          html_dir = results_dir / "html"
          html_dir.mkdir(parents=True, exist_ok=True)
          report_file = html_dir / "index.html"

          trx_files = sorted(results_dir.glob("*.trx"))
          rows = []

          if trx_files:
              ns = {"t": "http://microsoft.com/schemas/VisualStudio/TeamTest/2010"}
              for trx_file in trx_files:
                  root = ET.parse(trx_file).getroot()
                  for test in root.findall(".//t:UnitTestResult", ns):
                      name = test.attrib.get("testName", "Unknown")
                      outcome = test.attrib.get("outcome", "Unknown")
                      duration = test.attrib.get("duration", "")
                      rows.append(
                          f"<tr><td>{html.escape(name)}</td><td>{html.escape(outcome)}</td><td>{html.escape(duration)}</td></tr>"
                      )

          body = "".join(rows) if rows else "<tr><td colspan='3'>No test results were found.</td></tr>"
          report_file.write_text(
              "<!doctype html><html><head><meta charset='utf-8'><title>E2E Tests</title>"
              "<style>body{font-family:Arial,sans-serif;margin:20px;}table{border-collapse:collapse;width:100%;}"
              "th,td{border:1px solid #ddd;padding:8px;text-align:left;}th{background:#f3f3f3;}</style></head>"
              "<body><h1>E2E Test Results</h1><table><thead><tr><th>Test</th><th>Outcome</th><th>Duration</th></tr></thead>"
              f"<tbody>{body}</tbody></table></body></html>",
              encoding="utf-8"
          )
          PY

      - name: Upload E2E test HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-html
          path: TestResults/e2e/html/*.html
          if-no-files-found: error
